# ACN CI. Lint + format-check + the deterministic (non-service) test set.
# Service-dependent tests are marked `requires_services` and skipped here — the GitHub
# runner has no Kafka/Neo4j/Redis/Ollama; those run locally against the Docker stack.
name: ci

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install local-services requirements
        # The light runtime set — NOT the torch/PyG ML stack
        #.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: Pytest (deterministic tests only)
        run: pytest -m "not requires_services" --cov=acn --cov-report=term-missing
