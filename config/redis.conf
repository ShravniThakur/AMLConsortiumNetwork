# ACN Redis config (mounted read-only into the redis container).
# AOF persistence is non-negotiable: the owner-only hash-resolution maps must
# survive a container restart, or every restart costs a full re-export for the
# case store.

appendonly yes
appendfsync everysec

# AOF rewrite policy — keep the file bounded as baselines are written.
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Bind on all interfaces inside the container network; the port is only published to
# localhost via docker-compose. No external exposure.
bind 0.0.0.0
protected-mode no

# This is a feature store on the hot path, not a cache — do not evict baseline keys.
maxmemory-policy noeviction
