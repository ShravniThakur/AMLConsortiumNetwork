# ACN local service stack.
# Brings up: Zookeeper, Kafka (mTLS-only), Neo4j, Redis (AOF), the FastAPI api, Ollama.
# Secrets come from .env (gitignored) — never inline a real secret here.
#
# Cold-start target: `docker compose up -d` then `curl localhost:8000/health`
# returns every core dependency "ok" within ~60s (Neo4j is the long pole).

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: acn-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: acn-kafka
    depends_on:
      - zookeeper
    ports:
      # Only the mTLS (SSL) listener is published — no plaintext. Advertised as
      # localhost:9093 so host-side services (the institution producers run on the Mac) get
      # a resolvable address; the in-container CLI and inter-broker also reach the broker at
      # localhost:9093 (same container), and hostname verification is off (dev certs).
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: SSL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: SSL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SSL:SSL
      KAFKA_INTER_BROKER_LISTENER_NAME: SSL
      # mTLS: require client auth. Keystore/truststore are JKS produced by gen_certs.sh.
      KAFKA_SSL_KEYSTORE_FILENAME: kafka.broker.keystore.jks
      KAFKA_SSL_KEYSTORE_CREDENTIALS: broker_keystore_creds
      KAFKA_SSL_KEY_CREDENTIALS: broker_key_creds
      KAFKA_SSL_TRUSTSTORE_FILENAME: kafka.broker.truststore.jks
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: broker_truststore_creds
      # Stores are PKCS12 (modern keytool default) — declare it so the broker parses them.
      KAFKA_SSL_KEYSTORE_TYPE: PKCS12
      KAFKA_SSL_TRUSTSTORE_TYPE: PKCS12
      KAFKA_SSL_CLIENT_AUTH: required
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
      # Authorizer + ACLs: each institution principal may write only its own topic
      # (set by scripts/set-acls.sh). Deny by default once ACLs exist.
      KAFKA_AUTHORIZER_CLASS_NAME: kafka.security.authorizer.AclAuthorizer
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "false"
      # admin = CLI super-user for topics/ACLs; kafka = the broker's own cert principal,
      # which must be a super-user or the authorizer denies internal (__consumer_offsets) topics.
      KAFKA_SUPER_USERS: "User:admin;User:kafka"
      # Map the certificate CN to the Kafka principal (…CN=INST_A… -> User:INST_A).
      # CN is not first in the DN (openssl emits O=ACN,CN=INST_A), so match CN anywhere.
      KAFKA_SSL_PRINCIPAL_MAPPING_RULES: "RULE:^.*CN=([^,]+).*$$/$$1/,DEFAULT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      # gen_certs.sh writes JKS stores + credential files here.
      - ./certs/kafka:/etc/kafka/secrets:ro
      - kafka-data:/var/lib/kafka/data

  neo4j:
    image: neo4j:5.26-community
    container_name: acn-neo4j
    ports:
      - "7474:7474" # HTTP / browser
      - "7687:7687" # Bolt
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in .env}"
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      # Cap heap so Neo4j (JVM) coexists with Ollama (~4.9GB) + Kafka + Redis on a
      # 16GB Mac.
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

  redis:
    image: redis:7.4-alpine
    container_name: acn-redis
    ports:
      - "6379:6379"
    # AOF is non-negotiable — owner-side resolve maps must survive a restart.
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data

  ollama:
    image: ollama/ollama:latest
    container_name: acn-ollama
    ports:
      - "11434:11434"
    # Models (llama3.1:8b + nomic-embed-text) are pulled once by the operator into
    # this named volume — not baked into the image.
    volumes:
      - ollama-data:/root/.ollama

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: acn-api
    depends_on:
      - neo4j
      - redis
      - kafka
      - ollama
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in .env}"
      REDIS_URL: "redis://redis:6379/0"
      KAFKA_BROKER: "kafka:9093"
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_STR_MODEL: "llama3.1:8b"
      ACN_GIT_SHA: "${ACN_GIT_SHA:-unknown}"

volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  neo4j-data:
  neo4j-logs:
  redis-data:
  ollama-data:
